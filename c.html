<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SubTrainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c28;
  --border:#2a2a3d;
  --accent:#ff3c5f;
  --accent2:#7c5cff;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  overscroll-behavior:none;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.status-pill{
  font-size:11px;font-weight:600;letter-spacing:.4px;
  padding:5px 11px;border-radius:20px;
  background:var(--surface2);color:var(--muted);
  border:1px solid var(--border);
  max-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── SCROLL BODY ── */
.scroll-body{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(240px + var(--safe-bottom));
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card-label{
  font-size:10px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}

/* ── INPUT ROW ── */
.input-row{display:flex;gap:8px;align-items:center;}
input[type=password],
input[type=text]{
  flex:1;padding:13px 14px;font-size:15px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface2);color:var(--text);
  font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
}
input[type=password]:focus,
input[type=text]:focus{border-color:var(--accent2);}

.icon-btn{
  width:50px;height:50px;border:none;border-radius:10px;
  background:var(--accent2);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.icon-btn:active{opacity:.8;}

/* ── GRAMMAR PILLS ── */
.grammar-wrap{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:2px;
}
.g-pill{
  padding:6px 13px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .18s;
  -webkit-user-select:none;user-select:none;
}
.g-pill.active{
  background:var(--accent2);border-color:var(--accent2);color:#fff;
}
.g-pill:active{opacity:.7;}

/* ── SESSION STRIP ── */
.session-wrap{overflow:hidden;}
.session-strip{
  display:flex;gap:7px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 0 4px;scrollbar-width:none;
}
.session-strip::-webkit-scrollbar{display:none;}
.s-btn{
  flex:0 0 auto;min-width:46px;height:38px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);
  font-size:13px;font-weight:600;cursor:pointer;
}
.s-btn.done{background:#152015;border-color:#2a452a;color:#5a9a5a;}
.s-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.s-btn:active{opacity:.7;}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

/* Progress */
.progress-bar{height:3px;background:var(--surface2);}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .5s ease;width:0%;
}

/* Subtitle */
.sub-area{
  padding:14px 18px 10px;
  min-height:106px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
}
.sub-hi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:23px;font-weight:600;line-height:1.5;
  color:#fff;opacity:0;transition:opacity .35s ease;min-height:34px;
}
.sub-en{
  font-size:15px;line-height:1.5;
  color:#9090b8;margin-top:6px;
  opacity:0;transition:opacity .35s ease;min-height:22px;
}
.sub-hi.show,.sub-en.show{opacity:1;}

/* Controls */
.ctrl-row{
  display:flex;align-items:center;gap:9px;
  padding:10px 14px 12px;
}
.nav-btn{
  width:52px;height:52px;
  border:1px solid var(--border);border-radius:13px;
  background:var(--surface2);color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-btn:active{background:var(--border);}

.play-btn{
  flex:1;height:52px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--accent) 0%,#c0003a 100%);
  color:#fff;font-family:'Bebas Neue',sans-serif;
  font-size:23px;letter-spacing:2.5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 22px rgba(255,60,95,.28);
  transition:opacity .15s;
}
.play-btn:active{opacity:.82;}
.play-btn.paused{
  background:linear-gradient(135deg,var(--accent2) 0%,#4a2acc 100%);
  box-shadow:0 4px 22px rgba(124,92,255,.28);
}

/* ── LOADING OVERLAY ── */
.loading{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,10,15,.88);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading.show{display:flex;}
.spinner{
  width:46px;height:46px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:15px;color:var(--muted);letter-spacing:.3px;}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingText">Processing…</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">SubTrainer</div>
  <div class="status-pill" id="statusPill">Ready</div>
</div>

<!-- SCROLLABLE AREA -->
<div class="scroll-body">

  <!-- API KEY -->
  <div class="card">
    <div class="card-label">Gemini API Key</div>
    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="Paste your Gemini key…">
      <button class="icon-btn" id="saveKeyBtn">💾</button>
    </div>
  </div>

  <!-- TOPIC -->
  <div class="card">
    <div class="card-label">Topic (optional)</div>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="e.g. market, travel, family…">
    </div>
  </div>

  <!-- GRAMMAR FOCUS -->
  <div class="card">
    <div class="card-label">Grammar Focus</div>
    <div class="grammar-wrap" id="grammarPills"></div>
  </div>

  <!-- SESSION HISTORY (hidden until first generation) -->
  <div class="card" id="sessionCard" style="display:none">
    <div class="card-label">Sessions &mdash; <span id="sessionInfo"></span></div>
    <div class="session-strip" id="sessionButtons"></div>
  </div>

</div><!-- /scroll-body -->

<!-- FIXED BOTTOM BAR -->
<div class="bottom-bar">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="sub-area">
    <div class="sub-hi" id="hindi"></div>
    <div class="sub-en" id="english"></div>
  </div>

  <div class="ctrl-row">
    <button class="nav-btn" id="prev" title="Previous session">◀</button>
    <button class="play-btn" id="toggle">▶ &nbsp;PLAY</button>
    <button class="nav-btn" id="next" title="Next / New session">▶▶</button>
  </div>
</div>

<script>
/* ═══════════════════════════════ CONFIG ══════════════════════════════ */
const GRAMMAR_TOPICS = [
  { label:"Random",    hi:"यादृच्छिक",  val:"random" },
  { label:"Noun",      hi:"संज्ञा",     val:"संज्ञा (Noun)" },
  { label:"Pronoun",   hi:"सर्वनाम",   val:"सर्वनाम (Pronoun)" },
  { label:"Verb",      hi:"क्रिया",    val:"क्रिया (Verb)" },
  { label:"Adjective", hi:"विशेषण",    val:"विशेषण (Adjective)" },
  { label:"Adverb",    hi:"क्रिया विशेषण", val:"क्रिया विशेषण (Adverb)" },
  { label:"Postpos.",  hi:"संबंधबोधक", val:"संबंधबोधक (Postposition)" },
  { label:"Conj.",     hi:"समुच्चयबोधक",val:"समुच्चयबोधक (Conjunction)" },
  { label:"Interj.",   hi:"विस्मयादिबोधक",val:"विस्मयादिबोधक (Interjection)" },
];

const RANDOM_TOPICS = [
  "market","kitchen","travel","friendship","weather","school","family",
  "cricket","monsoon","street food","morning routine","festival","village",
  "office","shopping","train journey","childhood","cooking","neighbours","garden",
  "bus stop","tea stall","evening walk","mobile phone","internet","social media","online shopping","birthday party","wedding","doctor visit","hospital","gym","exercise","yoga","park","traffic","police","rainy day","summer vacation","winter morning","breakfast","lunch","dinner","fast food","restaurant","hotel stay","flight journey","metro","auto ride","bike ride","car drive","pet dog","pet cat","animals","birds","farm","farmer","school bus","classroom","homework","teacher","exam day","result day","holiday","picnic","zoo","museum","movie","cinema hall","tv show","cartoon","music","dance","singing","shopping mall","grocery store","vegetable market","fruit shop","clothes shop","shoe shop","tailor","salon","haircut","makeup","cleaning","washing clothes","ironing","sleeping","dream","alarm clock","late night","early morning","sunrise","sunset","river","lake","mountains","forest","beach","road trip","traffic jam","accident","helping others","kindness","honesty","truth","lie","anger","happiness","sadness","fear","surprise","love","friend call","family dinner","guest at home","festival preparation","decoration","lights","gifts","shopping list","budget","saving money","bank","atm","online payment","upi","bill payment","electricity","water supply","internet issue","repair work","plumber","electrician","car mechanic","office meeting","boss","colleague","teamwork","deadline","project","presentation","email","phone call","interview","job search","promotion","salary","leave application","work from home","time management","stress","relaxation","meditation","reading book","writing","drawing","painting","craft","gardening","planting trees","watering plants","clean city","pollution","garbage","recycling","plastic","environment","global warming","news","newspaper","headline","weather report","sports","football","badminton","kabaddi","running","walking","cycling","healthy food","junk food","diet","water drinking","doctor advice","medicine","fever","cold","cough","first aid","emergency","help line","police station","court","law","rules","discipline","school rules","punishment","reward","competition","winning","losing","motivation","goal","dream job","future plan","childhood memory","old friends","school days","college life","first job","first salary","success","failure","learning","mistake","improvement","daily routine","weekend","free time","hobby","gaming","mobile game","online class","teacher explanation","group study","notes","revision","confidence","public speaking","stage fear","celebration","party","cake","snacks","cold drink","tea time","coffee","chatting","gossip","argument","discussion","solution","problem","idea","innovation","technology","robot","ai","computer","laptop","keyboard","mouse","software","app","update","bug","error","fixing","learning new skill","practice","training","online course","certificate","achievement","award","respect","responsibility","family support","parents","siblings","grandparents","uncle","aunt","cousins","neighbour help","community","society","cleanliness","security","watchman","gate","lift","stairs","electric cut","power backup","generator","fan","ac","heater","water cooler","kitchen work","cooking gas","cylinder","utensils","washing dishes","cutting vegetables","making tea","making roti","making rice","making dal",
  "railway station","platform","ticket counter","waiting room","lost luggage","announcement","queue","crowd","security check","boarding","seat reservation","window seat","upper berth","lower berth","travel bag","packing","unpacking","tour guide","map","direction","lost in city","new place","language problem","local food","street market","bargaining","cheap items","expensive things","brand","discount","sale","offer","festival shopping","gift wrapping","surprise gift","return gift","invitation","wedding card","function hall","dance floor","dj night","music system","loud sound","neighbors complaint","silence","peace","noise","construction work","dust","heat","cold wind","fog","storm","thunder","lightning","umbrella","raincoat","wet clothes","dry clothes","laundry","washing machine","detergent","soap","clean water","dirty water","tap","bucket","bathroom","mirror","toothbrush","toothpaste","bath","shower","towel","comb","hair oil","face wash","skin care","perfume","deodorant","dressing","formal clothes","casual clothes","uniform","shoes","slippers","socks","watch","bag","wallet","money","coins","notes","change","loan","interest","saving habit","expenses","income","profit","loss","business","customer","shopkeeper","service","feedback","review","rating","complaint","support","call center","waiting time","hold music","network issue","slow internet","fast internet","download","upload","video call","mute","unmute","camera on","camera off","meeting link","login","logout","password","forgot password","security","otp","verification","account","profile","settings","update profile","privacy","data","backup","restore","delete","recover","file","folder","document","pdf","image","video","editing","cut copy paste","typing","keyboard shortcut","mouse click","right click","double click","scroll","zoom","screen","brightness","volume","headphones","speaker","mic","recording","playback","pause","stop","restart","shutdown","power button","charging","battery","low battery","full charge","power bank","cable","adapter","plug","socket","switch","fan speed","light on","light off","bulb","tube light","led","decoration lights","festival lights","rangoli","flowers","garland","temple","prayer","morning पूजा","evening आरती","bell","incense sticks","oil lamp","fasting","prasad","devotion","faith","belief","tradition","culture","custom","ritual","story","myth","history","freedom","independence","leader","hero","soldier","army","police duty","traffic rule","helmet","seatbelt","fine","license","driving","learning driving","driving test","road safety","signal","red light","green light","yellow light","zebra crossing","footpath","street light","night walk","dark road","fear at night","safety","self defense","help request","emergency call","ambulance","hospital visit","doctor advice","healthy lifestyle","morning walk","fresh air","deep breathing","exercise routine","gym trainer","weight loss","weight gain","protein","vitamins","fruits","vegetables","junk craving","sweet food","spicy food","home food","outside food","tiffin","lunch box","sharing food","friends lunch","school break","office break","tea break","coffee break","snack time","hunger","thirst","cold drink","juice","milk","water bottle","clean water","boiling water","filter","fridge","freezer","ice","cooling","heating","microwave","gas stove","flame","burning","safety in kitchen","knife","cut","injury","first aid box","bandage","medicine time","tablet","syrup","rest","sleep","nap","dream","night routine","morning habits","good habits","bad habits","punctuality","late coming","early leaving","discipline","focus","attention","concentration","distraction","mobile addiction","screen time","study time","revision time","test preparation","confidence building","practice speaking","learning english","grammar","sentence","word meaning","translation","conversation","mistake correction","improvement","feedback","teacher help","parent support","self study","online learning","offline class","group discussion","debate","presentation skills","stage performance","clapping","appreciation","criticism","motivation speech","goal setting","planning","strategy","execution","result","success story","failure lesson","hard work","smart work","time saving","shortcut","habit building","daily tracking","progress","growth","experience","knowledge","wisdom"
];

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ═══════════════════════════════ STATE ══════════════════════════════ */
let GEMINI_KEY = localStorage.getItem("gemini_key") || "";
let selectedGrammar = "random";
let sessions = [];         // array of sentence arrays
let currentSession = -1;
let sentences = [];
let playing = false;
let speakAborted = false;
let voices = [];

const apiInput     = document.getElementById("apiKeyInput");
const topicInput   = document.getElementById("topicInput");
const hindiBox     = document.getElementById("hindi");
const englishBox   = document.getElementById("english");
const toggleBtn    = document.getElementById("toggle");
const statusPill   = document.getElementById("statusPill");
const loadingDiv   = document.getElementById("loading");
const loadingTxt   = document.getElementById("loadingText");
const progressFill = document.getElementById("progressFill");

if (GEMINI_KEY) apiInput.value = GEMINI_KEY;

/* ═══════════════════════════════ UTILS ══════════════════════════════ */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const setStatus = msg => { statusPill.textContent = msg; };
const showLoading = msg => { loadingTxt.textContent = msg; loadingDiv.classList.add("show"); };
const hideLoading = () => { loadingDiv.classList.remove("show"); };
const setProgress = frac => { progressFill.style.width = Math.min(Math.max(frac, 0), 1) * 100 + "%"; };

function fade(el, text) {
  return new Promise(r => {
    el.classList.remove("show");
    setTimeout(() => { el.textContent = text; el.classList.add("show"); r(); }, 260);
  });
}

/* ═══════════════════════════════ API KEY ════════════════════════════ */
document.getElementById("saveKeyBtn").onclick = () => {
  const k = apiInput.value.trim();
  if (!k) { setStatus("Enter key!"); return; }
  localStorage.setItem("gemini_key", k);
  GEMINI_KEY = k;
  setStatus("Key saved ✅");
};

/* ═══════════════════════════════ GRAMMAR PILLS ══════════════════════ */
const pillWrap = document.getElementById("grammarPills");
GRAMMAR_TOPICS.forEach(g => {
  const p = document.createElement("button");
  p.className = "g-pill" + (g.val === "random" ? " active" : "");
  p.textContent = g.label;
  p.title = g.hi;
  p.onclick = () => {
    selectedGrammar = g.val;
    document.querySelectorAll(".g-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
  };
  pillWrap.appendChild(p);
});

/* ═══════════════════════════════ WAKE LOCK ═══════════════════════════ */
let wakeLock = null;
async function enableWakeLock() {
  try {
    if (wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    // On mobile, browser kills TTS when tab is hidden — stop gracefully
    if (isMobile && playing) {
      stopPlayback(); setPlayState(false); setStatus("⏸ Paused — tab hidden");
    }
    // On desktop (Windows/Mac), TTS keeps working in background — do nothing
  } else {
    if (playing) enableWakeLock();
  }
});

/* ═══════════════════════════════ SESSION STRIP ══════════════════════ */
function renderSessions() {
  const card = document.getElementById("sessionCard");
  const strip = document.getElementById("sessionButtons");
  if (!sessions.length) { card.style.display = "none"; return; }
  card.style.display = "block";
  document.getElementById("sessionInfo").textContent = sessions.length + " session" + (sessions.length > 1 ? "s" : "");
  strip.innerHTML = "";
  sessions.forEach((_, i) => {
    const b = document.createElement("button");
    b.className = "s-btn" + (i === currentSession ? " active" : i < currentSession ? " done" : "");
    b.textContent = i + 1;
    b.onclick = () => jumpSession(i);
    strip.appendChild(b);
  });
  const active = strip.querySelector(".active");
  if (active) active.scrollIntoView({ inline: "center", block: "nearest" });
  setProgress(currentSession / Math.max(sessions.length - 1, 1));
}

function jumpSession(i) {
  if (i < 0 || i >= sessions.length) return;
  stopPlayback();
  currentSession = i;
  sentences = sessions[i];
  setPlayState(false);
  renderSessions();
  setStatus("Session " + (i + 1) + " · " + sentences.length + " lines");
}

/* ═══════════════════════════════ CONTROLS ═══════════════════════════ */
function setPlayState(isPlaying) {
  playing = isPlaying;
  if (isPlaying) {
    toggleBtn.innerHTML = "⏸ &nbsp;PAUSE";
    toggleBtn.classList.add("paused");
  } else {
    toggleBtn.innerHTML = "▶ &nbsp;PLAY";
    toggleBtn.classList.remove("paused");
  }
}

toggleBtn.onclick = () => {
  if (playing) {
    stopPlayback(); setPlayState(false);
  } else {
    if (sentences.length) startPlayback(0);
    else generateAndPlay();
  }
};

document.getElementById("prev").onclick = () => {
  if (currentSession > 0) jumpSession(currentSession - 1);
};

document.getElementById("next").onclick = () => {
  if (currentSession < sessions.length - 1) {
    jumpSession(currentSession + 1);
    startPlayback(0);
  } else {
    // Generate a new session
    generateAndPlay();
  }
};

function stopPlayback() {
  speakAborted = true; playing = false;
  try { speechSynthesis.cancel(); } catch(e) {}
  hideLoading();
}

/* ═══════════════════════════════ VOICES ═════════════════════════════ */
function preloadVoices() { voices = speechSynthesis.getVoices(); }
speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); };

function getBestVoice(lang) {
  if (!voices.length) voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang === lang)
      || voices.find(v => v.lang.startsWith(lang.split("-")[0]))
      || null;
}

/* ═══════════════════════════════ AI ════════════════════════════════ */
async function generateAndPlay() {
  if (!GEMINI_KEY) { alert("Enter Gemini API key first"); return; }

  stopPlayback();
  showLoading("Generating Hindi content…");
  setStatus("Thinking…");

  // Always respect current UI settings; "Random" pill = pick one each time
  const topic = topicInput.value.trim() || pickRandom(RANDOM_TOPICS);

  const grammarPool = GRAMMAR_TOPICS.filter(g => g.val !== "random").map(g => g.val);
  const grammar = selectedGrammar === "random"
    ? pickRandom(grammarPool)
    : selectedGrammar;

  const topicLine = `The paragraph should be about the theme: "${topic}".`;

  const prompt = `Write a simple Hindi paragraph (150–220 words) in very easy, everyday spoken Hindi.
${topicLine}
The paragraph should naturally focus on this part of speech: ${grammar}. Naturally include many examples of it.
Keep the language natural and conversational, not formal or bookish.

Then break the paragraph into small natural sentences. Convert the output into a JSON array where each item has:
'hi': the Hindi sentence
'en': its natural English translation (not literal, but conversational)

Output format example:
[{"hi":"...","en":"..."},{"hi":"...","en":"..."}]

Return ONLY valid JSON. Do not add explanations, headings, or extra text.`;

  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_KEY,
        { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
      );
      const data = await res.json();
      if (!data.candidates) throw new Error("No candidates: " + JSON.stringify(data));
      let raw = data.candidates[0].content.parts[0].text;
      raw = raw.replace(/```json|```/g, "");
      raw = raw.substring(raw.indexOf("["), raw.lastIndexOf("]") + 1);
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.length < 3) throw new Error("Bad split");

      // Add to sessions
      sessions.push(parsed);
      currentSession = sessions.length - 1;
      sentences = parsed;

      hideLoading();
      setStatus("Session " + sessions.length + " · " + sentences.length + " lines");
      renderSessions();
      startPlayback(0);
      return;
    } catch(e) {
      console.warn("Attempt " + (attempt + 1) + " failed:", e);
      showLoading("Retry " + (attempt + 1) + "/3…");
      await sleep(1600);
    }
  }
  hideLoading();
  setStatus("❌ AI failed — check key/network");
}

/* ═══════════════════════════════ PLAYBACK ═══════════════════════════ */
async function startPlayback(startIndex) {
  if (!sentences.length) return;
  stopPlayback();
  await sleep(130);
  playing = true; speakAborted = false;
  setPlayState(true);
  await enableWakeLock();

  for (let i = startIndex; i < sentences.length; i++) {
    if (!playing) return;
    setProgress(i / Math.max(sentences.length - 1, 1));
    await showSentence(sentences[i], i);
    if (!playing) return;
  }

  setProgress(1);
  renderSessions();
  // Auto-continue as long as playback wasn't manually stopped
  if (playing) {
    setStatus("Next session incoming…");
    await sleep(1800);
    if (playing) generateAndPlay(); // uses current UI topic + grammar
  } else {
    setPlayState(false);
    setStatus("Session " + (currentSession + 1) + " done ✅");
  }
}

async function showSentence(s, index) {
  await fade(hindiBox, s.hi);
  if (!playing) return;
  await speakText(s.hi, "hi-IN");
  if (!playing) return;

  await sleep(6000);
  if (!playing) return;

  await fade(englishBox, s.en);
  if (!playing) return;
  await speakText(s.en, "en-US");
  if (!playing) return;

  await sleep(2500);
}

/* ═══════════════════════════════ SPEECH (Android safe) ══════════════ */
function speakText(text, lang) {
  return new Promise(resolve => {
    if (!playing) { resolve(); return; }
    speechSynthesis.cancel();

    setTimeout(() => {
      if (!playing) { resolve(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.9;
      const v = getBestVoice(lang);
      if (v) u.voice = v;

      let done = false;
      const finish = () => { if (!done) { done = true; clearTimeout(wd); resolve(); } };

      const words = text.split(" ").length;
      const wd = setTimeout(() => {
        speechSynthesis.cancel(); finish();
      }, Math.max(words * 660, 3500) + 2000);

      u.onend   = finish;
      u.onerror = finish;
      speechSynthesis.speak(u);
    }, 160);
  });
}
