<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SubTrainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c28;
  --border:#2a2a3d;
  --accent:#ff3c5f;
  --accent2:#7c5cff;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  overscroll-behavior:none;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.status-pill{
  font-size:11px;font-weight:600;letter-spacing:.4px;
  padding:5px 11px;border-radius:20px;
  background:var(--surface2);color:var(--muted);
  border:1px solid var(--border);
  max-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── SCROLL BODY ── */
.scroll-body{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(240px + var(--safe-bottom));
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card-label{
  font-size:10px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}

/* ── INPUT ROW ── */
.input-row{display:flex;gap:8px;align-items:center;}
input[type=password],
input[type=text]{
  flex:1;padding:13px 14px;font-size:15px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface2);color:var(--text);
  font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
}
input[type=password]:focus,
input[type=text]:focus{border-color:var(--accent2);}

.icon-btn{
  width:50px;height:50px;border:none;border-radius:10px;
  background:var(--accent2);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.icon-btn:active{opacity:.8;}

/* ── GRAMMAR PILLS ── */
.grammar-wrap{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:2px;
}
.g-pill{
  padding:6px 13px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .18s;
  -webkit-user-select:none;user-select:none;
}
.g-pill.active{
  background:var(--accent2);border-color:var(--accent2);color:#fff;
}
.g-pill:active{opacity:.7;}

/* ── SESSION STRIP ── */
.session-wrap{overflow:hidden;}
.session-strip{
  display:flex;gap:7px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 0 4px;scrollbar-width:none;
}
.session-strip::-webkit-scrollbar{display:none;}
.s-btn{
  flex:0 0 auto;min-width:46px;height:38px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);
  font-size:13px;font-weight:600;cursor:pointer;
}
.s-btn.done{background:#152015;border-color:#2a452a;color:#5a9a5a;}
.s-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.s-btn:active{opacity:.7;}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

/* Progress */
.progress-bar{height:3px;background:var(--surface2);}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .5s ease;width:0%;
}

/* Subtitle */
.sub-area{
  padding:14px 18px 10px;
  min-height:106px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
}
.sub-hi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:23px;font-weight:600;line-height:1.5;
  color:#fff;opacity:0;transition:opacity .35s ease;min-height:34px;
}
.sub-en{
  font-size:15px;line-height:1.5;
  color:#9090b8;margin-top:6px;
  opacity:0;transition:opacity .35s ease;min-height:22px;
}
.sub-hi.show,.sub-en.show{opacity:1;}

/* Controls */
.ctrl-row{
  display:flex;align-items:center;gap:9px;
  padding:10px 14px 12px;
}
.nav-btn{
  width:52px;height:52px;
  border:1px solid var(--border);border-radius:13px;
  background:var(--surface2);color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-btn:active{background:var(--border);}

.play-btn{
  flex:1;height:52px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--accent) 0%,#c0003a 100%);
  color:#fff;font-family:'Bebas Neue',sans-serif;
  font-size:23px;letter-spacing:2.5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 22px rgba(255,60,95,.28);
  transition:opacity .15s;
}
.play-btn:active{opacity:.82;}
.play-btn.paused{
  background:linear-gradient(135deg,var(--accent2) 0%,#4a2acc 100%);
  box-shadow:0 4px 22px rgba(124,92,255,.28);
}

/* ── LOADING OVERLAY ── */
.loading{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,10,15,.88);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading.show{display:flex;}
.spinner{
  width:46px;height:46px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:15px;color:var(--muted);letter-spacing:.3px;}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingText">Processing…</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">SubTrainer</div>
  <div class="status-pill" id="statusPill">Ready</div>
</div>

<!-- SCROLLABLE AREA -->
<div class="scroll-body">

  <!-- API KEY -->
  <div class="card">
    <div class="card-label">Gemini API Key</div>
    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="Paste your Gemini key…">
      <button class="icon-btn" id="saveKeyBtn">💾</button>
    </div>
  </div>

  <!-- TOPIC -->
  <div class="card">
    <div class="card-label">Topic (optional)</div>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="e.g. market, travel, family…">
    </div>
  </div>

  <!-- GRAMMAR FOCUS -->
  <div class="card">
    <div class="card-label">Grammar Focus</div>
    <div class="grammar-wrap" id="grammarPills"></div>
  </div>

  <!-- SESSION HISTORY (hidden until first generation) -->
  <div class="card" id="sessionCard" style="display:none">
    <div class="card-label">Sessions &mdash; <span id="sessionInfo"></span></div>
    <div class="session-strip" id="sessionButtons"></div>
  </div>

</div><!-- /scroll-body -->

<!-- FIXED BOTTOM BAR -->
<div class="bottom-bar">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="sub-area">
    <div class="sub-hi" id="hindi"></div>
    <div class="sub-en" id="english"></div>
  </div>

  <div class="ctrl-row">
    <button class="nav-btn" id="prev" title="Previous session">◀</button>
    <button class="play-btn" id="toggle">▶ &nbsp;PLAY</button>
    <button class="nav-btn" id="next" title="Next / New session">▶▶</button>
  </div>
</div>

<script>
/* ═══════════════════════════════ CONFIG ══════════════════════════════ */
const CACHE_KEY      = "subtrainer_sentence_cache";
const CACHE_MAX      = 45;

const GRAMMAR_TOPICS = [
  { label:"Random", val:"random" },
  { label:"Noun", val:"संज्ञा (Noun)" },
  { label:"Pronoun", val:"सर्वनाम (Pronoun)" },
  { label:"Verb", val:"क्रिया (Verb)" },
  { label:"Adjective", val:"विशेषण (Adjective)" },
  { label:"Adverb", val:"क्रिया विशेषण (Adverb)" },
  { label:"All Mixed", val:"all (mixed)" },
  { label:"Daily Use", val:"Daily Conversation" },
  { label:"Office Talk", val:"Office Conversation" },
  { label:"Casual Talk", val:"Casual Conversation" },
];

const ORDERED_TOPICS = [
  "Operating Systems",
  "Windows Administration",
  "Linux Basics",
  "Cloud Platforms",
  "Office Conversation",
  "Daily Standup Meeting",
  "Client Communication",
  "Technical Discussion",
  "Helpdesk Scenarios",
  "Small Talk in Office"
];

let topicIndex = Number(localStorage.getItem("topic_index") || 0) % ORDERED_TOPICS.length;

function nextTopic() {
  const custom = topicInput.value.trim();

  if (custom) return custom;

  const t = ORDERED_TOPICS[topicIndex];

  topicIndex = (topicIndex + 1) % ORDERED_TOPICS.length;

  localStorage.setItem("topic_index", topicIndex);

  return t;
}

function pickRandom(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* ═══════════════════════════════ CACHE ══════════════════════════════ */

function loadCache() {
  try {
    return JSON.parse(localStorage.getItem(CACHE_KEY) || "[]");
  } catch(e) {
    return [];
  }
}

function saveCache(arr) {
  localStorage.setItem(CACHE_KEY, JSON.stringify(arr));
}

function pushToCache(sentenceArr, topic) {

  let cache = loadCache();

  const tagged = sentenceArr.map(s => ({
    hi: s.hi,
    en: s.en,
    topic,
    ts: Date.now()
  }));

  cache = cache.concat(tagged).slice(-CACHE_MAX);

  saveCache(cache);

  updateCacheUI(cache);
}

function clearCache() {
  saveCache([]);
  updateCacheUI([]);
}

function updateCacheUI(cache) {

  if (!cache) cache = loadCache();

  document.getElementById("cacheCount").textContent = cache.length;

  const repeatBtn = document.getElementById("repeatBtn");

  repeatBtn.disabled = cache.length === 0;

  const hint = document.getElementById("cacheTopicHint");

  if (cache.length > 0) {
    const lastTopic = cache[cache.length - 1].topic || "";
    hint.textContent = lastTopic ? `Latest: "${lastTopic}"` : "";
  } else {
    hint.textContent = "Play a session to cache sentences";
  }
}

/* ═══════════════════════════════ STATE ══════════════════════════════ */

let GEMINI_KEY = localStorage.getItem("gemini_key") || "";

let selectedGrammar = "random";

let sessions = [];
let currentSession = -1;

let sentences = [];

let playing = false;
let speakAborted = false;

let voices = [];

let isRepeatMode = false;

/* NEW */
let autoRepeatDone = false;

const apiInput     = document.getElementById("apiKeyInput");
const topicInput   = document.getElementById("topicInput");

const hindiBox     = document.getElementById("hindi");
const englishBox   = document.getElementById("english");

const toggleBtn    = document.getElementById("toggle");

const statusPill   = document.getElementById("statusPill");

const loadingDiv   = document.getElementById("loading");
const loadingTxt   = document.getElementById("loadingText");

const progressFill = document.getElementById("progressFill");

const modeBadge    = document.getElementById("modeBadge");

if (GEMINI_KEY) apiInput.value = GEMINI_KEY;

updateCacheUI();

/* ═══════════════════════════════ UTILS ══════════════════════════════ */

const sleep = ms => new Promise(r => setTimeout(r, ms));

const setStatus = msg => {
  statusPill.textContent = msg;
};

const showLoading = msg => {
  loadingTxt.textContent = msg;
  loadingDiv.classList.add("show");
};

const hideLoading = () => {
  loadingDiv.classList.remove("show");
};

const setProgress = frac => {
  progressFill.style.width =
    Math.min(Math.max(frac, 0), 1) * 100 + "%";
};

function setRepeatMode(on) {

  isRepeatMode = on;

  modeBadge.classList.toggle("show", on);

  if (on) {
    toggleBtn.classList.add("repeat-mode");
    toggleBtn.classList.remove("paused");
  } else {
    toggleBtn.classList.remove("repeat-mode");
  }
}

function fade(el, text) {

  return new Promise(r => {

    el.classList.remove("show");

    setTimeout(() => {

      el.textContent = text;

      el.classList.add("show");

      r();

    }, 260);
  });
}

/* ═══════════════════════════════ API KEY ════════════════════════════ */

document.getElementById("saveKeyBtn").onclick = () => {

  const k = apiInput.value.trim();

  if (!k) {
    setStatus("Enter key!");
    return;
  }

  localStorage.setItem("gemini_key", k);

  GEMINI_KEY = k;

  setStatus("Key saved ✅");
};

/* ═══════════════════════════════ GRAMMAR PILLS ══════════════════════ */

const pillWrap = document.getElementById("grammarPills");

GRAMMAR_TOPICS.forEach(g => {

  const p = document.createElement("button");

  p.className =
    "g-pill" + (g.val === "random" ? " active" : "");

  p.textContent = g.label;

  p.onclick = () => {

    selectedGrammar = g.val;

    document
      .querySelectorAll(".g-pill")
      .forEach(x => x.classList.remove("active"));

    p.classList.add("active");
  };

  pillWrap.appendChild(p);
});

/* ═══════════════════════════════ CACHE CONTROLS ════════════════════ */

document.getElementById("repeatBtn").onclick = () => {

  const cache = loadCache();

  if (!cache.length) return;

  stopPlayback();

  setRepeatMode(true);

  sentences = cache.map(s => ({
    hi: s.hi,
    en: s.en
  }));

  setStatus("Repeating cached sentences");

  startPlayback(0);
};

document.getElementById("clearCacheBtn").onclick = () => {

  if (confirm("Clear cache?")) {

    clearCache();

    setStatus("Cache cleared");
  }
};

/* ═══════════════════════════════ WAKE LOCK ═══════════════════════════ */

let wakeLock = null;

async function enableWakeLock() {

  try {

    if (wakeLock && !wakeLock.released) return;

    wakeLock = await navigator.wakeLock.request('screen');

  } catch(e) {}
}

/* ═══════════════════════════════ VOICES ═════════════════════════════ */

function preloadVoices() {
  voices = speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};

function getBestVoice(lang) {

  if (!voices.length)
    voices = speechSynthesis.getVoices();

  return voices.find(v => v.lang === lang)
      || voices.find(v => v.lang.startsWith(lang.split("-")[0]))
      || null;
}

/* ═══════════════════════════════ AI ════════════════════════════════ */

async function generateAndPlay() {

  if (!GEMINI_KEY) {

    alert("Enter Gemini API key first");

    return;
  }

  setRepeatMode(false);

  stopPlayback();

  showLoading("Generating Hindi content…");

  setStatus("Thinking…");

  const topic = nextTopic();

  const grammarPool =
    GRAMMAR_TOPICS
      .filter(g => g.val !== "random")
      .map(g => g.val);

  const grammar =
    selectedGrammar === "random"
      ? pickRandom(grammarPool)
      : selectedGrammar;

  const prompt = `
Write 45 short Hindi spoken sentences.

Topic: ${topic}

Grammar focus: ${grammar}

Rules:
- Very short spoken Hindi
- Very natural casual English translation
- Max 15 words
- Daily life style
- Return JSON only

Format:
[
 {"hi":"...","en":"..."}
]
`;

  for (let attempt = 0; attempt < 3; attempt++) {

    try {

      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_KEY,
        {
          method: "POST",
          headers: {
            "Content-Type":"application/json"
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: prompt
              }]
            }]
          })
        }
      );

      const data = await res.json();

      if (!data.candidates)
        throw new Error("No response");

      let raw =
        data.candidates[0].content.parts[0].text;

      raw = raw.replace(/```json|```/g, "");

      raw =
        raw.substring(
          raw.indexOf("["),
          raw.lastIndexOf("]") + 1
        );

      const parsed = JSON.parse(raw);

      if (!Array.isArray(parsed))
        throw new Error("Invalid JSON");

      const clean = parsed.map(s => ({
        hi: s.hi.trim(),
        en: s.en.trim()
      }));

      pushToCache(clean, topic);

      sessions.push(clean);

      currentSession = sessions.length - 1;

      sentences = clean;

      hideLoading();

      setStatus(
        "Session " +
        sessions.length +
        " · " +
        sentences.length +
        " lines"
      );

      autoRepeatDone = false;

      startPlayback(0);

      return;

    } catch(e) {

      console.warn(e);

      showLoading(
        "Retry " + (attempt + 1)
      );

      await sleep(1600);
    }
  }

  hideLoading();

  setStatus("AI failed");
}

/* ═══════════════════════════════ PLAYBACK ═══════════════════════════ */

async function startPlayback(startIndex = 0) {

  if (!sentences.length) return;

  stopPlayback();

  await sleep(130);

  playing = true;

  speakAborted = false;

  setPlayState(true);

  await enableWakeLock();

  for (let i = startIndex; i < sentences.length; i++) {

    if (!playing) return;

    setProgress(
      i / Math.max(sentences.length - 1, 1)
    );

    await showSentence(sentences[i], i);

    if (!playing) return;
  }

  setProgress(1);

  /* FIRST PLAY COMPLETED */

  if (!autoRepeatDone) {

    autoRepeatDone = true;

    setStatus("↺ Repeating same 45 sentences...");

    await sleep(1500);

    if (!playing) return;

    await startPlayback(0);

    return;
  }

  /* SECOND PLAY COMPLETED */

  autoRepeatDone = false;

  if (!playing) return;

  setStatus("✨ Generating fresh new sentences...");

  await sleep(1800);

  if (!playing) return;

  generateAndPlay();
}

/* ═══════════════════════════════ SHOW SENTENCE ══════════════════════ */

async function showSentence(s) {

  await fade(hindiBox, s.hi);

  if (!playing) return;

  await speakText(s.hi, "hi-IN");

  if (!playing) return;

  await sleep(6000);

  if (!playing) return;

  await fade(englishBox, s.en);

  if (!playing) return;

  await speakText(s.en, "en-US");

  if (!playing) return;

  await sleep(2500);
}

/* ═══════════════════════════════ SPEECH ════════════════════════════ */

function speakText(text, lang) {

  return new Promise(resolve => {

    if (!playing) {
      resolve();
      return;
    }

    speechSynthesis.cancel();

    setTimeout(() => {

      if (!playing) {
        resolve();
        return;
      }

      const u =
        new SpeechSynthesisUtterance(text);

      u.lang = lang;

      u.rate = 0.9;

      const v = getBestVoice(lang);

      if (v) u.voice = v;

      let done = false;

      const finish = () => {

        if (!done) {

          done = true;

          clearTimeout(wd);

          resolve();
        }
      };

      const words = text.split(" ").length;

      const wd = setTimeout(() => {

        speechSynthesis.cancel();

        finish();

      }, Math.max(words * 660, 3500) + 2000);

      u.onend = finish;

      u.onerror = finish;

      speechSynthesis.speak(u);

    }, 160);
  });
}

/* ═══════════════════════════════ CONTROLS ═══════════════════════════ */

function setPlayState(isPlaying) {

  playing = isPlaying;

  if (isPlaying) {

    toggleBtn.innerHTML = "⏸ PAUSE";

    toggleBtn.classList.add("paused");

  } else {

    toggleBtn.innerHTML = "▶ PLAY";

    toggleBtn.classList.remove("paused");
  }
}

toggleBtn.onclick = () => {

  if (playing) {

    stopPlayback();

    setPlayState(false);

  } else {

    if (sentences.length) {

      startPlayback(0);

    } else {

      generateAndPlay();
    }
  }
};

function stopPlayback() {

  speakAborted = true;

  playing = false;

  autoRepeatDone = false;

  try {

    speechSynthesis.cancel();

  } catch(e) {}

  hideLoading();
}

/* ═══════════════════════════════ INIT ══════════════════════════════ */

window.onload = () => {
  preloadVoices();
};
</script>
</body>
</html>
