<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SubTrainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c28;
  --border:#2a2a3d;
  --accent:#ff3c5f;
  --accent2:#7c5cff;
  --accent3:#00c896;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  overscroll-behavior:none;
}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.status-pill{
  font-size:11px;font-weight:600;letter-spacing:.4px;
  padding:5px 11px;border-radius:20px;
  background:var(--surface2);color:var(--muted);
  border:1px solid var(--border);
  max-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.scroll-body{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(260px + var(--safe-bottom));
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card-label{
  font-size:10px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}

.input-row{display:flex;gap:8px;align-items:center;}
input[type=password],
input[type=text]{
  flex:1;padding:13px 14px;font-size:15px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface2);color:var(--text);
  font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
}
input[type=password]:focus,
input[type=text]:focus{border-color:var(--accent2);}

.icon-btn{
  width:50px;height:50px;border:none;border-radius:10px;
  background:var(--accent2);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.icon-btn:active{opacity:.8;}

.grammar-wrap{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:2px;
}
.g-pill{
  padding:6px 13px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .18s;
  -webkit-user-select:none;user-select:none;
}
.g-pill.active{
  background:var(--accent2);border-color:var(--accent2);color:#fff;
}
.g-pill:active{opacity:.7;}

.session-wrap{overflow:hidden;}
.session-strip{
  display:flex;gap:7px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 0 4px;scrollbar-width:none;
}
.session-strip::-webkit-scrollbar{display:none;}
.s-btn{
  flex:0 0 auto;min-width:46px;height:38px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);
  font-size:13px;font-weight:600;cursor:pointer;
}
.s-btn.done{background:#152015;border-color:#2a452a;color:#5a9a5a;}
.s-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.s-btn:active{opacity:.7;}

.cache-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.cache-info{
  font-size:13px;color:var(--muted);flex:1;
}
.cache-info strong{color:var(--accent3);font-weight:600;}
.cache-actions{display:flex;gap:8px;}

.repeat-btn{
  padding:9px 16px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent3),#009e74);
  color:#000;font-family:'Bebas Neue',sans-serif;
  font-size:16px;letter-spacing:1.5px;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 14px rgba(0,200,150,.25);
  transition:opacity .15s;
}
.repeat-btn:active{opacity:.75;}
.repeat-btn:disabled{opacity:.35;cursor:not-allowed;}

.clear-btn{
  padding:9px 14px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;
}
.clear-btn:active{opacity:.7;}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

.progress-bar{height:3px;background:var(--surface2);}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .5s ease;width:0%;
}

.sub-area{
  padding:14px 18px 10px;
  min-height:106px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
  position:relative;
}
.sub-hi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:23px;font-weight:600;line-height:1.5;
  color:#fff;opacity:0;transition:opacity .35s ease;min-height:34px;
}
.sub-en{
  font-size:15px;line-height:1.5;
  color:#9090b8;margin-top:6px;
  opacity:0;transition:opacity .35s ease;min-height:22px;
}
.sub-hi.show,.sub-en.show{opacity:1;}

.mode-badge{
  position:absolute;top:8px;right:14px;
  font-size:10px;font-weight:700;letter-spacing:1px;
  padding:3px 9px;border-radius:10px;
  background:rgba(0,200,150,.15);color:var(--accent3);
  border:1px solid rgba(0,200,150,.3);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.mode-badge.show{opacity:1;}

.ctrl-row{
  display:flex;align-items:center;gap:9px;
  padding:10px 14px 12px;
}
.nav-btn{
  width:52px;height:52px;
  border:1px solid var(--border);border-radius:13px;
  background:var(--surface2);color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-btn:active{background:var(--border);}

.play-btn{
  flex:1;height:52px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--accent) 0%,#c0003a 100%);
  color:#fff;font-family:'Bebas Neue',sans-serif;
  font-size:23px;letter-spacing:2.5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 22px rgba(255,60,95,.28);
  transition:opacity .15s;
}
.play-btn:active{opacity:.82;}
.play-btn.paused{
  background:linear-gradient(135deg,var(--accent2) 0%,#4a2acc 100%);
  box-shadow:0 4px 22px rgba(124,92,255,.28);
}
.play-btn.repeat-mode{
  background:linear-gradient(135deg,var(--accent3) 0%,#009e74 100%);
  box-shadow:0 4px 22px rgba(0,200,150,.28);
}

.loading{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,10,15,.88);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading.show{display:flex;}
.spinner{
  width:46px;height:46px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:15px;color:var(--muted);letter-spacing:.3px;}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingText">Processing…</div>
</div>

<div class="header">
  <div class="logo">SubTrainer</div>
  <div class="status-pill" id="statusPill">Ready</div>
</div>

<div class="scroll-body">

  <div class="card">
    <div class="card-label">Gemini API Key</div>
    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="Paste your Gemini key…">
      <button class="icon-btn" id="saveKeyBtn">💾</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Topic (optional)</div>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="e.g. market, travel, family…">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Grammar Focus</div>
    <div class="grammar-wrap" id="grammarPills"></div>
  </div>

  <div class="card" id="cacheCard">
    <div class="card-label">Recent Sentences Cache</div>
    <div class="cache-row">
      <div class="cache-info">
        <strong id="cacheCount">0</strong> / 45 sentences cached
        <div id="cacheTopicHint" style="font-size:11px;margin-top:3px;color:var(--muted);"></div>
      </div>
      <div class="cache-actions">
        <button class="repeat-btn" id="repeatBtn" disabled>↺ REPEAT</button>
        <button class="clear-btn" id="clearCacheBtn">Clear</button>
      </div>
    </div>
  </div>

  <div class="card" id="sessionCard" style="display:none">
    <div class="card-label">Sessions &mdash; <span id="sessionInfo"></span></div>
    <div class="session-strip" id="sessionButtons"></div>
  </div>

</div>

<div class="bottom-bar">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="sub-area">
    <div class="mode-badge" id="modeBadge">↺ REPEAT MODE</div>
    <div class="sub-hi" id="hindi"></div>
    <div class="sub-en" id="english"></div>
  </div>

  <div class="ctrl-row">
    <button class="nav-btn" id="prev" title="Previous session">◀</button>
    <button class="play-btn" id="toggle">▶ &nbsp;PLAY</button>
    <button class="nav-btn" id="next" title="Next / New session">▶▶</button>
  </div>
</div>

<script>
const CACHE_KEY  = "subtrainer_sentence_cache";
const CACHE_MAX  = 45;

const GRAMMAR_TOPICS = [
  { label:"In Order ↓", hi:"क्रमबद्ध",  val:"random" },
  { label:"Noun",      hi:"संज्ञा",     val:"संज्ञा (Noun)" },
  { label:"Pronoun",   hi:"सर्वनाम",   val:"सर्वनाम (Pronoun)" },
  { label:"Verb",      hi:"क्रिया",    val:"क्रिया (Verb)" },
  { label:"Adjective", hi:"विशेषण",    val:"विशेषण (Adjective)" },
  { label:"Adverb",    hi:"क्रिया विशेषण", val:"क्रिया विशेषण (Adverb)" },
  { label:"Postpos.",  hi:"संबंधबोधक", val:"संबंधबोधक (Postposition)" },
  { label:"Conj.",     hi:"समुच्चयबोधक",val:"समुच्चयबोधक (Conjunction)" },
  { label:"Interj.",   hi:"विस्मयादिबोधक",val:"विस्मयादिबोधक (Interjection)" },
  { label:"All Mixed",     hi:"मिश्रित",        val:"all (mixed)" },
  { label:"Tense",         hi:"काल",           val:"काल (Tense)" },
  { label:"Present",       hi:"वर्तमान काल",   val:"Present Tense" },
  { label:"Past",          hi:"भूतकाल",        val:"Past Tense" },
  { label:"Future",        hi:"भविष्य काल",    val:"Future Tense" },
  { label:"Sentence",      hi:"वाक्य",         val:"Sentence" },
  { label:"Simple Sent.",  hi:"सरल वाक्य",     val:"Simple Sentence" },
  { label:"Compound",      hi:"संयुक्त वाक्य",  val:"Compound Sentence" },
  { label:"Complex",       hi:"मिश्र वाक्य",    val:"Complex Sentence" },
  { label:"Question",      hi:"प्रश्नवाचक",     val:"Interrogative" },
  { label:"Negative",      hi:"नकारात्मक",     val:"Negative Sentence" },
  { label:"Imperative",    hi:"आज्ञार्थक",     val:"Imperative" },
  { label:"Exclamatory",   hi:"विस्मयादिबोधक वाक्य", val:"Exclamatory Sentence" },
  { label:"Modal Verbs",   hi:"सहायक क्रिया",   val:"Modal Verbs" },
  { label:"Preposition",   hi:"पूर्वसर्ग",      val:"Preposition" },
  { label:"Articles",      hi:"आर्टिकल",       val:"Articles (a, an, the)" },
  { label:"Daily Use",     hi:"दैनिक उपयोग",    val:"Daily Conversation" },
  { label:"Office Talk",   hi:"ऑफिस बातचीत",   val:"Office Conversation" },
  { label:"Casual Talk",   hi:"सामान्य बातचीत", val:"Casual Conversation" },
  { label:"Story Mode",    hi:"कहानी",         val:"Story" },
  { label:"Dialogue",      hi:"संवाद",         val:"Dialogue" },
  { label:"Practice",      hi:"अभ्यास",        val:"Practice Sentences" },
];

const ORDERED_TOPICS = [
  "Operating Systems","Windows Administration","Linux Basics","Command Line / Terminal",
  "System Troubleshooting","Error Messages & Logs","Monitoring & Alerts","Incident Management",
  "Change Management","Patch Management","User Support Conversations","Helpdesk Scenarios",
  "Ticket Handling","Escalation Situations","Remote Support","On-call Scenarios",
  "Email & Communication at Work","Meetings & Standups","Daily Status Updates",
  "Client Communication","Explaining Technical Issues Simply","Giving Instructions to Users",
  "Server Management","Virtual Machines","Containers & Docker","Kubernetes Basics",
  "Load Balancing","High Availability","Disaster Recovery","Backup & Restore",
  "Network Troubleshooting","DNS & DHCP","Firewalls & Security Groups","VPN & Remote Access",
  "Bandwidth & Latency","Cloud Platforms (AWS/Azure/GCP)","Cloud Costs & Billing",
  "Deployment & Releases","CI/CD Pipelines","Automation & Scripting","PowerShell Conversations",
  "Shell Scripting","Access Issues","Password Reset Scenarios","Permissions & Roles",
  "Identity & MFA","Security Incidents","Phishing & Email Threats","Endpoint Security",
  "Vulnerability & Patching","Compliance & Policies","Database Queries","SQL Conversations",
  "Performance Issues","Data Backup Issues","Working with Vendors","Talking to Managers",
  "Explaining Delays","Handling Pressure at Work","Asking for Help Professionally",
  "Small Talk in Office","Talking About Weekend","Talking About Workload",
  "Complaining Politely","Giving Feedback","Time Management","Task Prioritization",
  "Deadlines & Delivery","Project Discussions","Learning New Technology",
  "Self-Study Conversations","Explaining What You Learned","Career Growth Discussions",
  "Salary & Appraisal Talks","Talking to HR","Interview Preparation","Explaining Experience",
  "Starting a Meeting","Joining a Meeting Late","Ending a Meeting Politely",
  "Setting the Agenda","Changing the Agenda","Time Management in Meetings",
  "Sharing Your Opinion","Agreeing Politely","Disagreeing Politely","Interrupting Politely",
  "Asking Someone to Repeat","Asking for Clarification","Giving Suggestions","Giving Examples",
  "Giving Project Updates","Explaining a Delay","Explaining a Problem","Explaining a Solution",
  "Summarizing Discussion","Highlighting Key Points","Asking Questions in Meetings",
  "Answering Questions Clearly","Handling Difficult Questions","Deflecting a Question Politely",
  "Buying Time to Answer","Asking for Help in a Meeting","Offering Help","Assigning Tasks",
  "Accepting Responsibility","Following Up on Tasks","Checking Progress",
  "Talking to Manager in a Meeting","Talking to Client in a Meeting",
  "Handling Pressure in Meetings","Handling Criticism","Giving Feedback Politely",
  "Making Decisions","Delaying a Decision","Reaching Consensus","Proposing an Idea",
  "Rejecting an Idea Politely","Technical Issue Discussion","Production Issue Call",
  "Incident Bridge Call","Daily Standup Meeting","Sprint Planning Meeting",
  "Retrospective Meeting","Speaking Confidently","Speaking Clearly and Simply",
  "Avoiding Confusion","Being Brief and Direct","Using Soft and Polite Language",
  "Handling Silence in Meetings","Bringing Conversation Back on Track",
  "Stopping Someone Politely","Dealing with Over-Talkative People",
  "Handling Misunderstanding","Correcting Someone Politely","Asking Someone to Speed Up",
  "Asking Someone to Slow Down",
];

let topicIndex   = Number(localStorage.getItem("topic_index")   || 0) % ORDERED_TOPICS.length;
let grammarIndex = Number(localStorage.getItem("grammar_index") || 0);

function nextTopic() {
  const custom = topicInput.value.trim();
  if (custom) return custom;
  const t = ORDERED_TOPICS[topicIndex];
  topicIndex = (topicIndex + 1) % ORDERED_TOPICS.length;
  localStorage.setItem("topic_index", topicIndex);
  return t;
}

// Grammar pool = all pills except "random" — cycles in order, persisted
const GRAMMAR_POOL = GRAMMAR_TOPICS.filter(g => g.val !== "random").map(g => g.val);
grammarIndex = grammarIndex % GRAMMAR_POOL.length;

function nextGrammar() {
  // If user manually picked a pill (not "random"), use that instead
  if (selectedGrammar !== "random") return selectedGrammar;
  const g = GRAMMAR_POOL[grammarIndex];
  grammarIndex = (grammarIndex + 1) % GRAMMAR_POOL.length;
  localStorage.setItem("grammar_index", grammarIndex);
  return g;
}

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || "[]"); }
  catch(e) { return []; }
}
function saveCache(arr) { localStorage.setItem(CACHE_KEY, JSON.stringify(arr)); }

function pushToCache(sentenceArr, topic) {
  let cache = loadCache();
  const tagged = sentenceArr.map(s => ({ hi: s.hi, en: s.en, topic, ts: Date.now() }));
  cache = cache.concat(tagged).slice(-CACHE_MAX);
  saveCache(cache);
  updateCacheUI(cache);
}

function clearCache() { saveCache([]); updateCacheUI([]); }

function updateCacheUI(cache) {
  if (!cache) cache = loadCache();
  document.getElementById("cacheCount").textContent = cache.length;
  const repeatBtn = document.getElementById("repeatBtn");
  repeatBtn.disabled = cache.length === 0;
  const hint = document.getElementById("cacheTopicHint");
  if (cache.length > 0) {
    const lastTopic = cache[cache.length - 1].topic || "";
    hint.textContent = lastTopic ? `Latest: "${lastTopic}"` : "";
  } else {
    hint.textContent = "Play a session to cache sentences";
  }
}

/* ── STATE ── */
let GEMINI_KEY = localStorage.getItem("gemini_key") || "";
let selectedGrammar = "random";
let sessions = [];
let currentSession = -1;
let sentences = [];
let playing = false;
let speakAborted = false;
let voices = [];
let isRepeatMode = false;

const apiInput     = document.getElementById("apiKeyInput");
const topicInput   = document.getElementById("topicInput");
const hindiBox     = document.getElementById("hindi");
const englishBox   = document.getElementById("english");
const toggleBtn    = document.getElementById("toggle");
const statusPill   = document.getElementById("statusPill");
const loadingDiv   = document.getElementById("loading");
const loadingTxt   = document.getElementById("loadingText");
const progressFill = document.getElementById("progressFill");
const modeBadge    = document.getElementById("modeBadge");

if (GEMINI_KEY) apiInput.value = GEMINI_KEY;
updateCacheUI();

const sleep = ms => new Promise(r => setTimeout(r, ms));
const setStatus = msg => { statusPill.textContent = msg; };
const showLoading = msg => { loadingTxt.textContent = msg; loadingDiv.classList.add("show"); };
const hideLoading = () => { loadingDiv.classList.remove("show"); };
const setProgress = frac => { progressFill.style.width = Math.min(Math.max(frac, 0), 1) * 100 + "%"; };

function setRepeatMode(on) {
  isRepeatMode = on;
  modeBadge.classList.toggle("show", on);
  if (on) {
    toggleBtn.classList.add("repeat-mode");
    toggleBtn.classList.remove("paused");
  } else {
    toggleBtn.classList.remove("repeat-mode");
  }
}

function fade(el, text) {
  return new Promise(r => {
    el.classList.remove("show");
    setTimeout(() => { el.textContent = text; el.classList.add("show"); r(); }, 260);
  });
}

document.getElementById("saveKeyBtn").onclick = () => {
  const k = apiInput.value.trim();
  if (!k) { setStatus("Enter key!"); return; }
  localStorage.setItem("gemini_key", k);
  GEMINI_KEY = k;
  setStatus("Key saved ✅");
};

const pillWrap = document.getElementById("grammarPills");
GRAMMAR_TOPICS.forEach(g => {
  const p = document.createElement("button");
  p.className = "g-pill" + (g.val === "random" ? " active" : "");
  p.textContent = g.label;
  p.title = g.hi;
  p.onclick = () => {
    selectedGrammar = g.val;
    document.querySelectorAll(".g-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
  };
  pillWrap.appendChild(p);
});

document.getElementById("repeatBtn").onclick = () => {
  const cache = loadCache();
  if (!cache.length) return;
  stopPlayback();
  setRepeatMode(true);
  sentences = cache.map(s => ({ hi: s.hi, en: s.en }));
  setStatus("Repeating " + sentences.length + " cached sentences");
  startPlayback(0);
};

document.getElementById("clearCacheBtn").onclick = () => {
  if (confirm("Clear all " + loadCache().length + " cached sentences?")) {
    clearCache();
    setStatus("Cache cleared");
  }
};

let wakeLock = null;
async function enableWakeLock() {
  try {
    if (wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    if (isMobile && playing) {
      stopPlayback(); setPlayState(false); setStatus("⏸ Paused — tab hidden");
    }
  } else {
    if (playing) enableWakeLock();
  }
});

function renderSessions() {
  const card = document.getElementById("sessionCard");
  const strip = document.getElementById("sessionButtons");
  if (!sessions.length) { card.style.display = "none"; return; }
  card.style.display = "block";
  document.getElementById("sessionInfo").textContent = sessions.length + " session" + (sessions.length > 1 ? "s" : "");
  strip.innerHTML = "";
  sessions.forEach((_, i) => {
    const b = document.createElement("button");
    b.className = "s-btn" + (i === currentSession ? " active" : i < currentSession ? " done" : "");
    b.textContent = i + 1;
    b.onclick = () => jumpSession(i);
    strip.appendChild(b);
  });
  const active = strip.querySelector(".active");
  if (active) active.scrollIntoView({ inline: "center", block: "nearest" });
  setProgress(currentSession / Math.max(sessions.length - 1, 1));
}

function jumpSession(i) {
  if (i < 0 || i >= sessions.length) return;
  stopPlayback();
  setRepeatMode(false);
  currentSession = i;
  sentences = sessions[i];
  setPlayState(false);
  renderSessions();
  setStatus("Session " + (i + 1) + " · " + sentences.length + " lines");
}

function setPlayState(isPlaying) {
  playing = isPlaying;
  if (isPlaying) {
    toggleBtn.innerHTML = "⏸ &nbsp;PAUSE";
    toggleBtn.classList.add("paused");
    toggleBtn.classList.remove("repeat-mode");
  } else {
    if (isRepeatMode) {
      toggleBtn.innerHTML = "↺ &nbsp;REPEAT";
      toggleBtn.classList.remove("paused");
      toggleBtn.classList.add("repeat-mode");
    } else {
      toggleBtn.innerHTML = "▶ &nbsp;PLAY";
      toggleBtn.classList.remove("paused");
      toggleBtn.classList.remove("repeat-mode");
    }
  }
}

toggleBtn.onclick = () => {
  if (playing) {
    stopPlayback(); setPlayState(false);
  } else {
    if (sentences.length) {
      startPlayback(0);
    } else {
      generateAndPlay();
    }
  }
};

document.getElementById("prev").onclick = () => {
  if (isRepeatMode) { stopPlayback(); setRepeatMode(false); setPlayState(false); setStatus("Exited repeat mode"); return; }
  if (currentSession > 0) jumpSession(currentSession - 1);
};

document.getElementById("next").onclick = () => {
  if (isRepeatMode) { stopPlayback(); setRepeatMode(false); generateAndPlay(); return; }
  if (currentSession < sessions.length - 1) {
    jumpSession(currentSession + 1);
    startPlayback(0);
  } else {
    generateAndPlay();
  }
};

function stopPlayback() {
  speakAborted = true; playing = false;
  try { speechSynthesis.cancel(); } catch(e) {}
  hideLoading();
}

function preloadVoices() { voices = speechSynthesis.getVoices(); }
speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); };

function getBestVoice(lang) {
  if (!voices.length) voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang === lang)
      || voices.find(v => v.lang.startsWith(lang.split("-")[0]))
      || null;
}

async function generateAndPlay() {
  if (!GEMINI_KEY) { alert("Enter Gemini API key first"); return; }

  setRepeatMode(false);
  stopPlayback();
  showLoading("Generating Hindi content…");
  setStatus("Thinking…");

  const topic = nextTopic();

  const grammar = nextGrammar();

  const topicLine = `The paragraph should be about the theme: "${topic}".`;

  const prompt = `Write a simple Hindi paragraph (150–220 words) in very easy, everyday spoken Hindi.
${topicLine}
The paragraph should naturally focus on this part of speech: ${grammar}. Naturally include many examples of it.
Keep the language natural and conversational, not formal or bookish.

IMPORTANT FOR ENGLISH:
- Translate each sentence into very natural, casual American English.
- Use how people actually speak in daily life (contractions, fillers, softeners).
- Avoid literal translation. Make it sound like a real person talking.
- Include conversation starters and continuation phrases where possible.

Examples of tone to follow:
- "Hey, what's up?"
- "So, I was just thinking..."
- "By the way..."
- "You know what I mean?"
- "Honestly, I feel like..."
- "Have you ever noticed...?"
- "I'm not sure why, but..."

STYLE RULES FOR ENGLISH:
- Use contractions (I'm, it's, don't, kinda, wanna, gonna where natural)
- Add light fillers (like, actually, just, you know) but don't overuse
- Keep sentences short and natural
- Make it sound friendly and easy to speak out loud

CRITICAL RULES:
- Absolutely no markdown. No asterisks (*), no bold (**word**), no underscores, no special symbols. Plain text only.
- Hindi sentences: clean Devanagari script, normal punctuation only (। or . or ? or !) and each sentence should not be longer than 15 words.
- English translation: write it the way a native English speaker would naturally say it - idiomatic and fluent, never word-for-word literal.

Break into small natural sentences. Return a JSON array where each item has:
'hi': the Hindi sentence (plain text, zero markdown)
'en': natural idiomatic English a native speaker would actually say

Output format:
[{"hi":"...","en":"..."},{"hi":"...","en":"..."}]

Return ONLY valid JSON. No explanations, no headings, no markdown, no extra text.`;

  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_KEY,
        { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
      );
      const data = await res.json();
      if (!data.candidates) throw new Error("No candidates: " + JSON.stringify(data));
      let raw = data.candidates[0].content.parts[0].text;
      raw = raw.replace(/```json|```/g, "");
      raw = raw.substring(raw.indexOf("["), raw.lastIndexOf("]") + 1);
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.length < 3) throw new Error("Bad split");

      const clean = parsed.map(s => ({
        hi: s.hi.replace(/\*{1,3}([^*]+)\*{1,3}/g,"$1").replace(/_([^_]+)_/g,"$1").trim(),
        en: s.en.replace(/\*{1,3}([^*]+)\*{1,3}/g,"$1").replace(/_([^_]+)_/g,"$1").trim()
      }));

      pushToCache(clean, topic);

      sessions.push(clean);
      currentSession = sessions.length - 1;
      sentences = clean;

      hideLoading();
      setStatus("Session " + sessions.length + " · " + sentences.length + " lines · " + topic + " · " + grammar);
      renderSessions();
      startPlayback(0);
      return;
    } catch(e) {
      console.warn("Attempt " + (attempt + 1) + " failed:", e);
      showLoading("Retry " + (attempt + 1) + "/3…");
      await sleep(1600);
    }
  }
  hideLoading();
  setStatus("❌ AI failed — check key/network");
}

async function startPlayback(startIndex) {
  if (!sentences.length) return;
  stopPlayback();
  await sleep(130);
  playing = true; speakAborted = false;
  setPlayState(true);
  await enableWakeLock();

  for (let i = startIndex; i < sentences.length; i++) {
    if (!playing) return;
    setProgress(i / Math.max(sentences.length - 1, 1));
    await showSentence(sentences[i], i);
    if (!playing) return;
  }

  setProgress(1);

  // ── CHANGED: after repeat mode finishes, automatically generate & play next session ──
  if (isRepeatMode) {
    if (playing) {
      setStatus("Repeat done ✅  — loading next session…");
      setRepeatMode(false);
      await sleep(1200);
      if (playing) generateAndPlay();
    } else {
      setPlayState(false);
    }
    return;
  }

  renderSessions();
  if (playing) {
    setStatus("Next session incoming…");
    await sleep(1800);
    if (playing) generateAndPlay();
  } else {
    setPlayState(false);
    setStatus("Session " + (currentSession + 1) + " done ✅");
  }
}

async function showSentence(s, index) {
  await fade(hindiBox, s.hi);
  if (!playing) return;
  await speakText(s.hi, "hi-IN");
  if (!playing) return;

  await sleep(6000);
  if (!playing) return;

  await fade(englishBox, s.en);
  if (!playing) return;
  await speakText(s.en, "en-US");
  if (!playing) return;

  await sleep(2500);
}

function speakText(text, lang) {
  return new Promise(resolve => {
    if (!playing) { resolve(); return; }
    speechSynthesis.cancel();

    setTimeout(() => {
      if (!playing) { resolve(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.9;
      const v = getBestVoice(lang);
      if (v) u.voice = v;

      let done = false;
      const finish = () => { if (!done) { done = true; clearTimeout(wd); resolve(); } };

      const words = text.split(" ").length;
      const wd = setTimeout(() => {
        speechSynthesis.cancel(); finish();
      }, Math.max(words * 660, 3500) + 2000);

      u.onend   = finish;
      u.onerror = finish;
      speechSynthesis.speak(u);
    }, 160);
  });
}

window.onload = () => { preloadVoices(); };
</script>
</body>
</html>
