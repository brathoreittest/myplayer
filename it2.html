<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SubTrainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Devanagari:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c28;
  --border:#2a2a3d;
  --accent:#ff3c5f;
  --accent2:#7c5cff;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  overscroll-behavior:none;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;
  top:0;
  z-index:50;
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.status-pill{
  font-size:11px;
  font-weight:600;
  letter-spacing:.4px;
  padding:5px 11px;
  border-radius:20px;
  background:var(--surface2);
  color:var(--muted);
  border:1px solid var(--border);
  max-width:165px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.scroll-body{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(240px + var(--safe-bottom));
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}

.card-label{
  font-size:10px;
  font-weight:600;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.input-row{
  display:flex;
  gap:8px;
  align-items:center;
}

input[type=password],
input[type=text]{
  flex:1;
  padding:13px 14px;
  font-size:15px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface2);
  color:var(--text);
  font-family:inherit;
  outline:none;
}

input:focus{
  border-color:var(--accent2);
}

.icon-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:10px;
  background:var(--accent2);
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.grammar-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.g-pill{
  padding:6px 13px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--muted);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}

.g-pill.active{
  background:var(--accent2);
  border-color:var(--accent2);
  color:#fff;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

.progress-bar{
  height:3px;
  background:var(--surface2);
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;
  transition:width .4s ease;
}

.sub-area{
  padding:14px 18px 10px;
  min-height:106px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.sub-hi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:23px;
  font-weight:600;
  line-height:1.5;
  color:#fff;
  opacity:0;
  transition:opacity .35s ease;
  min-height:34px;
}

.sub-en{
  font-size:15px;
  line-height:1.5;
  color:#9090b8;
  margin-top:6px;
  opacity:0;
  transition:opacity .35s ease;
  min-height:22px;
}

.sub-hi.show,
.sub-en.show{
  opacity:1;
}

.ctrl-row{
  display:flex;
  align-items:center;
  gap:9px;
  padding:10px 14px 12px;
}

.nav-btn{
  width:52px;
  height:52px;
  border:1px solid var(--border);
  border-radius:13px;
  background:var(--surface2);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
}

.play-btn{
  flex:1;
  height:52px;
  border:none;
  border-radius:13px;
  background:linear-gradient(135deg,var(--accent),#c0003a);
  color:#fff;
  font-family:'Bebas Neue',sans-serif;
  font-size:23px;
  letter-spacing:2px;
  cursor:pointer;
}

.play-btn.paused{
  background:linear-gradient(135deg,var(--accent2),#4a2acc);
}

.loading{
  display:none;
  position:fixed;
  inset:0;
  z-index:200;
  background:rgba(10,10,15,.88);
  backdrop-filter:blur(8px);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:16px;
}

.loading.show{
  display:flex;
}

.spinner{
  width:46px;
  height:46px;
  border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.loading-msg{
  font-size:15px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingText">Processing…</div>
</div>

<div class="header">
  <div class="logo">SubTrainer</div>
  <div class="status-pill" id="statusPill">Ready</div>
</div>

<div class="scroll-body">

  <div class="card">
    <div class="card-label">Gemini API Key</div>

    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="Paste Gemini key">
      <button class="icon-btn" id="saveKeyBtn">💾</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Topic (optional)</div>

    <div class="input-row">
      <input type="text" id="topicInput" placeholder="travel, office, family">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Grammar Focus</div>
    <div class="grammar-wrap" id="grammarPills"></div>
  </div>

</div>

<div class="bottom-bar">

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="sub-area">
    <div class="sub-hi" id="hindi"></div>
    <div class="sub-en" id="english"></div>
  </div>

  <div class="ctrl-row">
    <button class="nav-btn" id="prev">◀</button>

    <button class="play-btn" id="toggle">
      ▶ PLAY
    </button>

    <button class="nav-btn" id="next">▶▶</button>
  </div>

</div>

<script>

const GRAMMAR_TOPICS = [
  "Random",
  "Daily Conversation",
  "Office Conversation",
  "Tense",
  "Question",
  "Modal Verbs",
  "Story",
  "Dialogue",
  "Practice Sentences"
];

const ORDERED_TOPICS = [
  "Travel",
  "Family",
  "Office",
  "Meetings",
  "Friends",
  "Weekend",
  "Shopping",
  "Helpdesk",
  "Cloud",
  "Servers",
  "Career Growth"
];

let topicIndex = 0;

function nextTopic() {

  const custom = topicInput.value.trim();

  if (custom) return custom;

  const t = ORDERED_TOPICS[topicIndex];

  topicIndex =
    (topicIndex + 1) % ORDERED_TOPICS.length;

  return t;
}

let GEMINI_KEY =
  localStorage.getItem("gemini_key") || "";

let selectedGrammar = "Random";

let sessions = [];

let currentSession = -1;

let sentences = [];

let playing = false;

let speakAborted = false;

let voices = [];

const apiInput =
  document.getElementById("apiKeyInput");

const topicInput =
  document.getElementById("topicInput");

const hindiBox =
  document.getElementById("hindi");

const englishBox =
  document.getElementById("english");

const toggleBtn =
  document.getElementById("toggle");

const statusPill =
  document.getElementById("statusPill");

const loadingDiv =
  document.getElementById("loading");

const loadingTxt =
  document.getElementById("loadingText");

const progressFill =
  document.getElementById("progressFill");

if (GEMINI_KEY) {
  apiInput.value = GEMINI_KEY;
}

const sleep = ms =>
  new Promise(r => setTimeout(r, ms));

function setStatus(msg) {
  statusPill.textContent = msg;
}

function showLoading(msg) {
  loadingTxt.textContent = msg;
  loadingDiv.classList.add("show");
}

function hideLoading() {
  loadingDiv.classList.remove("show");
}

function setProgress(frac) {

  progressFill.style.width =
    (Math.min(Math.max(frac,0),1) * 100) + "%";
}

function fade(el, text) {

  return new Promise(resolve => {

    el.classList.remove("show");

    setTimeout(() => {

      el.textContent = text;

      el.classList.add("show");

      resolve();

    }, 220);

  });
}

document.getElementById("saveKeyBtn").onclick = () => {

  const k = apiInput.value.trim();

  if (!k) {
    setStatus("Enter key");
    return;
  }

  localStorage.setItem("gemini_key", k);

  GEMINI_KEY = k;

  setStatus("Saved ✅");
};

const pillWrap =
  document.getElementById("grammarPills");

GRAMMAR_TOPICS.forEach(g => {

  const p = document.createElement("button");

  p.className =
    "g-pill" + (g === "Random" ? " active" : "");

  p.textContent = g;

  p.onclick = () => {

    selectedGrammar = g;

    document
      .querySelectorAll(".g-pill")
      .forEach(x => x.classList.remove("active"));

    p.classList.add("active");
  };

  pillWrap.appendChild(p);
});

function setPlayState(isPlaying) {

  playing = isPlaying;

  if (isPlaying) {

    toggleBtn.innerHTML = "⏸ PAUSE";

    toggleBtn.classList.add("paused");

  } else {

    toggleBtn.innerHTML = "▶ PLAY";

    toggleBtn.classList.remove("paused");
  }
}

function stopPlayback(manual = true) {

  speakAborted = true;

  if (manual) {

    playing = false;

    setPlayState(false);
  }

  try {

    speechSynthesis.cancel();

  } catch(e) {}

  hideLoading();
}

function preloadVoices() {

  voices = speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged = preloadVoices;

function getBestVoice(lang) {

  if (!voices.length) {
    voices = speechSynthesis.getVoices();
  }

  return (
    voices.find(v => v.lang === lang)
    ||
    voices.find(v =>
      v.lang.startsWith(lang.split("-")[0])
    )
    ||
    null
  );
}

async function generateAndPlay() {

  if (!GEMINI_KEY) {

    alert("Enter Gemini API key");

    return;
  }

  stopPlayback(false);

  showLoading("Generating...");

  setStatus("Thinking...");

  const topic = nextTopic();

  const grammar =
    selectedGrammar === "Random"
    ?
    GRAMMAR_TOPICS[
      Math.floor(
        Math.random() *
        (GRAMMAR_TOPICS.length - 1)
      ) + 1
    ]
    :
    selectedGrammar;

  const prompt = `
Create 12 short Hindi spoken sentences.

Topic: ${topic}

Grammar focus:
${grammar}

Rules:
- Very natural spoken Hindi
- Easy daily language
- Each sentence under 12 words
- Give natural American English translation
- No markdown

Return JSON only:

[
{"hi":"...","en":"..."}
]
`;

  try {

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_KEY,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          contents:[
            {
              parts:[
                { text:prompt }
              ]
            }
          ]
        })
      }
    );

    const data = await res.json();

    let raw =
      data.candidates[0]
      .content.parts[0].text;

    raw =
      raw
      .replace(/```json/g,"")
      .replace(/```/g,"")
      .trim();

    raw =
      raw.substring(
        raw.indexOf("["),
        raw.lastIndexOf("]") + 1
      );

    const parsed = JSON.parse(raw);

    sentences = parsed;

    sessions.push(parsed);

    currentSession = sessions.length - 1;

    hideLoading();

    setStatus(
      "Session " +
      sessions.length
    );

    startPlayback(0);

  } catch(e) {

    console.error(e);

    hideLoading();

    setStatus("Generation failed");
  }
}

async function startPlayback(startIndex = 0) {

  if (!sentences.length) return;

  stopPlayback(false);

  await sleep(120);

  playing = true;

  speakAborted = false;

  setPlayState(true);

  for (let repeat = 0; repeat < 2; repeat++) {

    for (
      let i = startIndex;
      i < sentences.length;
      i++
    ) {

      if (!playing || speakAborted) {
        return;
      }

      setProgress(
        i /
        Math.max(sentences.length - 1, 1)
      );

      await showSentence(sentences[i]);

      if (!playing || speakAborted) {
        return;
      }
    }

    if (repeat === 0) {

      setStatus("🔁 Repeating...");

      await sleep(1400);

      if (!playing) return;
    }
  }

  setProgress(1);

  setStatus("✨ New session...");

  await sleep(1800);

  if (!playing) return;

  generateAndPlay();
}

async function showSentence(s) {

  englishBox.classList.remove("show");

  englishBox.textContent = "";

  await fade(hindiBox, s.hi);

  if (!playing) return;

  await speakText(s.hi, "hi-IN");

  if (!playing) return;

  await sleep(1200);

  if (!playing) return;

  await fade(englishBox, s.en);

  if (!playing) return;

  await speakText(s.en, "en-US");

  if (!playing) return;

  await sleep(1800);
}

function speakText(text, lang) {

  return new Promise(resolve => {

    if (!playing || speakAborted) {

      resolve();

      return;
    }

    const utterance =
      new SpeechSynthesisUtterance(text);

    utterance.lang = lang;

    utterance.rate = 0.9;

    utterance.pitch = 1;

    const voice = getBestVoice(lang);

    if (voice) {
      utterance.voice = voice;
    }

    let finished = false;

    const cleanup = () => {

      if (finished) return;

      finished = true;

      clearTimeout(fallbackTimer);

      resolve();
    };

    utterance.onend = cleanup;

    utterance.onerror = cleanup;

    const estimated =
      Math.max(
        text.split(" ").length * 700,
        3000
      );

    const fallbackTimer =
      setTimeout(() => {

        try {
          speechSynthesis.cancel();
        } catch(e) {}

        cleanup();

      }, estimated + 2500);

    try {

      speechSynthesis.speak(utterance);

    } catch(e) {

      cleanup();
    }
  });
}

toggleBtn.onclick = async () => {

  if (playing) {

    stopPlayback();

    return;
  }

  if (!sentences.length) {

    await generateAndPlay();

    return;
  }

  startPlayback(0);
};

document.getElementById("prev").onclick = () => {

  if (currentSession <= 0) return;

  currentSession--;

  sentences = sessions[currentSession];

  startPlayback(0);
};

document.getElementById("next").onclick = () => {

  generateAndPlay();
};

window.onload = () => {

  preloadVoices();
};

</script>

</body>
</html>
