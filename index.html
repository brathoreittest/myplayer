<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Subtitle Trainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;background:#000;font-family:Arial;color:#fff;}
.container{padding:12px;}

#apiKeyInput, input[type=file]{
  width:100%;padding:14px;font-size:16px;border-radius:10px;margin-bottom:8px;
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#e50914;
  color:#fff;
  margin-bottom:8px;
}

.controls{display:flex;gap:8px;}
.controls button{flex:1;}

#chunkButtons{
  display:flex;overflow-x:auto;gap:8px;padding:10px 0;
}
#chunkButtons button{flex:0 0 auto;min-width:60px;background:#333;}
.activeChunk{background:#00aaff !important;}

.subtitleBox{
  position:fixed;bottom:12%;left:0;right:0;text-align:center;padding:0 12px;
}
.subtitle{opacity:0;transition:0.5s;}
.show{opacity:1;}
#hindi{font-size:24px;margin-bottom:8px;}
#english{font-size:18px;color:#ccc;}
</style>
</head>

<body>

<div class="container">

<input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key">
<button id="saveKeyBtn">💾 Save API Key</button>

<input type="file" id="upload" accept=".srt">

<div class="controls">
<button id="toggle">⏸ Pause</button>
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<div id="chunkButtons"></div>

</div>

<div class="subtitleBox">
<div id="hindi" class="subtitle"></div>
<div id="english" class="subtitle"></div>
</div>

<script>

/* ================= API KEY ================= */
let GEMINI_KEY = localStorage.getItem("gemini_key") || "";
const apiInput = document.getElementById("apiKeyInput");

if(GEMINI_KEY) apiInput.value = GEMINI_KEY;

document.getElementById("saveKeyBtn").onclick = () => {
  const key = apiInput.value.trim();
  if(!key) return alert("Enter API key");
  localStorage.setItem("gemini_key", key);
  GEMINI_KEY = key;
  alert("Saved ✅");
};

/* ================= WAKE LOCK ================= */
let wakeLock=null;

async function enableWakeLock(){
  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(e){}
}

/* ================= APP ================= */
let words=[],chunks=[],currentChunk=0
let sentences=[],playing=false

const hindiBox=document.getElementById("hindi")
const englishBox=document.getElementById("english")
const toggleBtn=document.getElementById("toggle")

document.getElementById("upload").onchange=loadFile
toggleBtn.onclick=togglePlay
document.getElementById("prev").onclick=()=>jumpChunk(currentChunk-1)
document.getElementById("next").onclick=()=>jumpChunk(currentChunk+1)

/* Toggle */
function togglePlay(){
  if(playing){
    stopPlayback()
    toggleBtn.textContent="▶ Play"
  }else{
    toggleBtn.textContent="⏸ Pause"
    startPlayback()
  }
}

function stopPlayback(){
  playing=false
  speechSynthesis.cancel()
}

/* ================= FILE ================= */
async function loadFile(e){
  stopPlayback()
  const text = await e.target.files[0].text()
  localStorage.setItem("srt_data", text)
  processSavedText(text)
}

function processSavedText(text){
  const cleanText = text.replace(/\r\n|\r/g, "\n")
  const noTimestamps = cleanText.replace(/\d{2}:\d{2}:\d{2},\d{3} --> .*?\n/g, "")
  const noIndexes = noTimestamps.replace(/^\d+\n/gm, "")

  words = noIndexes
    .replace(/\n+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')

  chunks=[]
  for(let i=0;i<words.length;i+=100){
    chunks.push(words.slice(i,i+100).join(" "))
  }

  currentChunk = Number(localStorage.getItem("last_chunk")) || 0

  renderChunks()
  processChunk()
}

/* Auto load */
window.onload = () => {
  if(localStorage.getItem("srt_data")){
    if(confirm("Load last SRT file?")){
      processSavedText(localStorage.getItem("srt_data"))
    }
  }
}

/* ================= CHUNKS ================= */
function renderChunks(){
  const c=document.getElementById("chunkButtons")
  c.innerHTML=""

  chunks.forEach((_,i)=>{
    const b=document.createElement("button")
    b.textContent=i+1
    b.onclick=()=>jumpChunk(i)
    if(i===currentChunk) b.classList.add("activeChunk")
    c.appendChild(b)
  })
}

function jumpChunk(i){
  if(i<0||i>=chunks.length) return
  stopPlayback()
  currentChunk=i
  renderChunks()
  toggleBtn.textContent="⏸ Pause"
  processChunk()
}

/* ================= AI ================= */
async function processChunk(){

  if(!GEMINI_KEY) return alert("Enter API key first")
  if(!chunks[currentChunk]) return

  // FIXED: Strong instructions to split sentences properly
  const prompt=`
You are cleaning Hindi subtitles.

STRICT RULES:
1. Split into 6-10 SHORT sentences
2. Each sentence must be 6-12 words ONLY
3. Do NOT combine everything into one paragraph
4. Keep sentences natural and conversational
5. Each Hindi sentence MUST have matching English translation
6. Do NOT skip any content
7. Output MUST be an ARRAY of objects

Return ONLY JSON like:
[
  {"hi":"...","en":"..."},
  {"hi":"...","en":"..."}
]

TEXT:
${chunks[currentChunk]}
`

  try{
    const res=await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key="+GEMINI_KEY,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      }
    )

    const data=await res.json()
    let raw=data.candidates[0].content.parts[0].text
    raw=raw.replace(/```json|```/g,'')
    raw=raw.substring(raw.indexOf("["),raw.lastIndexOf("]")+1)
    sentences=JSON.parse(raw)

    if(!Array.isArray(sentences) || sentences.length < 5){
      console.log("Retrying - bad split")
      return processChunk();
    }

    startPlayback()

  }catch(e){
    console.log("Error fetching AI, retrying...", e)
    processChunk()
  }
}

/* ================= PLAY ================= */
async function startPlayback(){

  if(!sentences.length) return
  stopPlayback()
  playing=true
  await enableWakeLock()

  let startIndex = Number(localStorage.getItem("last_sentence")) || 0;

  for(let i=startIndex;i<sentences.length;i++){
    if(!playing) return
    await showSentence(sentences[i],i)
  }

  localStorage.setItem("last_sentence",0)

  currentChunk++
  renderChunks()

  if(currentChunk<chunks.length){
    processChunk()
  }else{
    playing=false
    toggleBtn.textContent="▶ Play"
  }
}

/* Show */
async function showSentence(s,index){

  localStorage.setItem("last_chunk", currentChunk)
  localStorage.setItem("last_sentence", index)

  await fade(hindiBox,s.hi)
  await speak(s.hi,"hi-IN")

  await sleep(3000)

  await fade(englishBox,s.en)
  await speak(s.en,"en-US")

  await sleep(800)
}

/* Helpers */
function fade(el,text){
  return new Promise(r=>{
    el.classList.remove("show")
    setTimeout(()=>{
      el.textContent=text
      el.classList.add("show")
      r()
    },200)
  })
}

function speak(text,lang){
  return new Promise(r=>{
    const u=new SpeechSynthesisUtterance(text)
    u.lang=lang
    u.onend=r
    speechSynthesis.speak(u)
  })
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
