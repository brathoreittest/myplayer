<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Subtitle Trainer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

.container{
  padding:12px;
}

/* API */
#apiKeyInput{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  margin-bottom:6px;
}

#saveKeyBtn{
  width:100%;
  margin-bottom:12px;
}

/* File */
input[type=file]{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  margin-bottom:10px;
}

/* Controls */
.controls{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

button{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#e50914;
  color:#fff;
}

/* Chunk buttons */
#chunkButtons{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px 0;
}

#chunkButtons button{
  flex:0 0 auto;
  min-width:60px;
  background:#333;
}

.activeChunk{
  background:#00aaff !important;
}

/* Subtitles */
.subtitleBox{
  position:fixed;
  bottom:12%;
  left:0;
  right:0;
  text-align:center;
  padding:0 12px;
}

.subtitle{
  opacity:0;
  transition:0.5s;
}

.show{opacity:1;}

#hindi{
  font-size:24px;
  margin-bottom:8px;
}

#english{
  font-size:18px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- API KEY -->
<input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key">
<button id="saveKeyBtn">💾 Save API Key</button>

<input type="file" id="upload" accept=".srt">

<div class="controls">
<button id="toggle">⏸ Pause</button>
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<div id="chunkButtons"></div>

</div>

<div class="subtitleBox">
<div id="hindi" class="subtitle"></div>
<div id="english" class="subtitle"></div>
</div>

<script>

/* ================= API KEY ================= */
let GEMINI_KEY = localStorage.getItem("gemini_key") || "";

const apiInput = document.getElementById("apiKeyInput");
const saveBtn = document.getElementById("saveKeyBtn");

if(GEMINI_KEY){
  apiInput.value = GEMINI_KEY;
}

saveBtn.onclick = () => {
  const key = apiInput.value.trim();

  if(!key){
    alert("Please enter API key");
    return;
  }

  localStorage.setItem("gemini_key", key);
  GEMINI_KEY = key;

  alert("API Key Saved ✅");
};


/* ================= APP ================= */
let words=[],chunks=[],currentChunk=0
let sentences=[],playing=false

const hindiBox=document.getElementById("hindi")
const englishBox=document.getElementById("english")
const toggleBtn=document.getElementById("toggle")

document.getElementById("upload").onchange=loadFile
toggleBtn.onclick=togglePlay
document.getElementById("prev").onclick=()=>jumpChunk(currentChunk-1)
document.getElementById("next").onclick=()=>jumpChunk(currentChunk+1)

/* Toggle */
function togglePlay(){
  if(playing){
    stopPlayback()
    toggleBtn.textContent="▶ Play"
  }else{
    toggleBtn.textContent="⏸ Pause"
    startPlayback()
  }
}

function stopPlayback(){
  playing=false
  speechSynthesis.cancel()
}

/* ================= LOAD FILE (FIXED) ================= */
async function loadFile(e){
  stopPlayback()

  const text = await e.target.files[0].text()

  // 🔥 FIX: normalize all line endings
  const cleanText = text.replace(/\r\n|\r/g, "\n")

  // remove timestamps
  const noTimestamps = cleanText.replace(/\d{2}:\d{2}:\d{2},\d{3} --> .*?\n/g, "")

  // remove numbering
  const noIndexes = noTimestamps.replace(/^\d+\n/gm, "")

  // final clean words
  words = noIndexes
    .replace(/\n+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')

  // chunking
  chunks=[]
  for(let i=0;i<words.length;i+=100){
    chunks.push(words.slice(i,i+100).join(" "))
  }

  currentChunk=0
  renderChunks()

  toggleBtn.textContent="⏸ Pause"
  processChunk()
}

/* Render chunks */
function renderChunks(){
  const c=document.getElementById("chunkButtons")
  c.innerHTML=""

  chunks.forEach((_,i)=>{
    const b=document.createElement("button")
    b.textContent=i+1
    b.onclick=()=>jumpChunk(i)

    if(i===currentChunk) b.classList.add("activeChunk")

    c.appendChild(b)
  })
}

/* Jump */
function jumpChunk(i){
  if(i<0||i>=chunks.length) return

  stopPlayback()
  currentChunk=i
  renderChunks()

  toggleBtn.textContent="⏸ Pause"
  processChunk()
}

/* ================= PROCESS ================= */
async function processChunk(){

  if(!GEMINI_KEY){
    alert("Please enter API key first");
    return;
  }

  if(!chunks[currentChunk]) return

  const prompt=`
You are cleaning Hindi subtitles.

STRICT RULES:
1. Split into 6-10 sentences
2. Each sentence must be 6-12 words
3. Do NOT return one paragraph
4. Use conversational Hindi
5. Provide English translation

Return JSON only:
[{"hi":"","en":""}]

TEXT:
${chunks[currentChunk]}
`

  try{
    const res=await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key="+GEMINI_KEY,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      }
    )

    const data=await res.json()
    let raw=data.candidates[0].content.parts[0].text

    raw=raw.replace(/```json/g,'').replace(/```/g,'')
    raw=raw.substring(raw.indexOf("["),raw.lastIndexOf("]")+1)

    let parsed=JSON.parse(raw)

    if(!Array.isArray(parsed) || parsed.length<3){
      return processChunk()
    }

    sentences=parsed

    startPlayback()

  }catch(e){
    processChunk()
  }
}

/* ================= PLAYBACK ================= */
async function startPlayback(){
  if(!sentences.length) return

  stopPlayback()
  playing=true

  for(let s of sentences){
    if(!playing) return
    await showSentence(s)
  }

  currentChunk++
  renderChunks()

  if(currentChunk<chunks.length){
    processChunk()
  }else{
    playing=false
    toggleBtn.textContent="▶ Play"
  }
}

/* Show */
async function showSentence(s){

  await fade(hindiBox,s.hi)
  await speak(s.hi,"hi-IN")

  await sleep(3000)

  await fade(englishBox,s.en)
  await sleep(500)
  await speak(s.en,"en-US")

  await sleep(800)
}

/* Fade */
function fade(el,text){
  return new Promise(r=>{
    el.classList.remove("show")
    setTimeout(()=>{
      el.textContent=text
      el.classList.add("show")
      r()
    },200)
  })
}

/* Speak */
function speak(text,lang){
  return new Promise(r=>{
    const u=new SpeechSynthesisUtterance(text)
    u.lang=lang
    u.onend=r
    speechSynthesis.speak(u)
  })
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
